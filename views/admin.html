<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MUSE Analytics</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    :root { --green:#2d5016; --bg:#f8f5f0; --card:#ffffff; --muted:#a09888; --border:#e8e3dc; --text:#2a2620; --accent:#1f6640; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); }
    header { background:var(--green); color:#fff; padding:20px 28px; display:flex; align-items:center; gap:12px; }
    header .brand { font-weight:600; letter-spacing:.04em; font-size:20px; }
    header .tag { color:rgba(255,255,255,.7); font-size:13px; }
    header h1 { margin-left:auto; font-size:16px; font-weight:500; opacity:.9; }
    main { max-width:1200px; margin:0 auto; padding:24px; }
    .filters { background:var(--card); border-radius:12px; padding:16px 20px; margin-bottom:20px; display:flex; gap:16px; align-items:flex-end; flex-wrap:wrap; box-shadow:0 2px 12px rgba(0,0,0,.04); }
    .filters label { display:flex; flex-direction:column; font-size:12px; color:var(--muted); gap:4px; }
    .filters input, .filters select { padding:8px 10px; border:1px solid var(--border); border-radius:6px; font-size:14px; min-width:140px; }
    .filters button { padding:10px 18px; background:var(--green); color:#fff; border:0; border-radius:6px; cursor:pointer; font-size:14px; font-weight:500; }
    .filters .spacer { flex:1; }
    .filters a { text-decoration:none; padding:10px 18px; background:#fff; color:var(--green); border:1px solid var(--green); border-radius:6px; font-size:14px; font-weight:500; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
    .card { background:var(--card); border-radius:12px; padding:18px 20px; box-shadow:0 2px 12px rgba(0,0,0,.04); }
    .card .label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .card .value { font-size:26px; font-weight:600; color:var(--green); margin-top:6px; }
    .card .sub { font-size:12px; color:var(--muted); margin-top:4px; }
    section { background:var(--card); border-radius:12px; padding:20px 24px; margin-bottom:20px; box-shadow:0 2px 12px rgba(0,0,0,.04); }
    section h2 { margin:0 0 14px; font-size:16px; color:var(--green); }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--border); }
    th { font-size:12px; color:var(--muted); font-weight:500; text-transform:uppercase; letter-spacing:.05em; }
    td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
    .empty { color:var(--muted); padding:16px; text-align:center; font-size:14px; }
    .status { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:500; }
    .status.pending  { background:#fef6e0; color:#8a6600; }
    .status.accepted { background:#e3f3e9; color:#1f6640; }
    .status.denied   { background:#fde8e8; color:#9b2626; }
    .err { background:#fef5f5; border-left:4px solid #b00020; padding:12px 16px; border-radius:0 8px 8px 0; color:#9b2626; font-size:14px; margin-bottom:16px; }
    .quote-tabs { display:flex; gap:8px; margin-bottom:12px; }
    .quote-tabs button { padding:6px 14px; font-size:13px; border:1px solid var(--border); background:#fff; color:var(--muted); border-radius:6px; cursor:pointer; font-weight:500; }
    .quote-tabs button.active { background:var(--green); color:#fff; border-color:var(--green); }
    .btn-accept { background:var(--accent); color:#fff; border:0; border-radius:5px; padding:6px 12px; font-size:13px; cursor:pointer; margin-right:6px; }
    .btn-deny { background:#b00020; color:#fff; border:0; border-radius:5px; padding:6px 12px; font-size:13px; cursor:pointer; }
    .btn-accept:disabled, .btn-deny:disabled { opacity:.5; cursor:wait; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center; padding:16px; }
    .modal-overlay.open { display:flex; }
    .modal-card { background:var(--card); border-radius:12px; box-shadow:0 12px 40px rgba(0,0,0,.18); max-width:480px; width:100%; max-height:calc(100vh - 32px); overflow:auto; }
    .modal-header { padding:18px 22px 12px; border-bottom:1px solid var(--border); }
    .modal-header h3 { margin:0; font-size:16px; color:var(--green); }
    .modal-body { padding:18px 22px; }
    .modal-body .meta { background:#f8f5f0; border-radius:8px; padding:12px 14px; font-size:13px; line-height:1.6; margin-bottom:16px; color:var(--text); }
    .modal-body .meta strong { color:var(--green); }
    .modal-body label { display:block; font-size:12px; color:var(--muted); margin:14px 0 4px; text-transform:uppercase; letter-spacing:.05em; }
    .modal-body input, .modal-body textarea { width:100%; padding:9px 11px; border:1px solid var(--border); border-radius:6px; font-size:14px; font-family:inherit; box-sizing:border-box; }
    .modal-body textarea { min-height:80px; resize:vertical; }
    .modal-footer { padding:12px 22px 18px; display:flex; gap:10px; justify-content:flex-end; }
    .modal-footer button { padding:9px 18px; border-radius:6px; font-size:14px; font-weight:500; cursor:pointer; border:1px solid var(--border); }
    .modal-footer .btn-cancel { background:#fff; color:var(--muted); }
    .modal-footer .btn-confirm { background:var(--green); color:#fff; border-color:var(--green); }
    .modal-footer .btn-confirm.deny { background:#b00020; border-color:#b00020; }
    .modal-footer button:disabled { opacity:.5; cursor:wait; }
    .modal-card.wide { max-width:640px; }
    .table-search { margin-bottom:10px; }
    .table-search input { width:100%; max-width:320px; padding:8px 10px; border:1px solid var(--border); border-radius:6px; font-size:14px; }
    .table-scroll { overflow-x:auto; }
    .table-pager { display:flex; align-items:center; gap:10px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); font-size:13px; color:var(--muted); }
    .table-pager button { padding:4px 12px; border:1px solid var(--border); background:#fff; color:var(--text); border-radius:5px; cursor:pointer; font-size:13px; }
    .table-pager button:disabled { opacity:.4; cursor:default; }
    .table-pager .pager-meta { margin-left:auto; }
    tbody tr.clickable { cursor:pointer; }
    tbody tr.clickable:hover { background:#fafaf6; }
    .order-items { width:100%; border-collapse:collapse; font-size:13px; margin-top:8px; }
    .order-items th, .order-items td { padding:7px 10px; border-bottom:1px solid var(--border); text-align:left; }
    .order-items th { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; font-weight:500; }
    .order-items td.num, .order-items th.num { text-align:right; font-variant-numeric:tabular-nums; }
    .modal-footer .btn-link { background:#fff; color:var(--green); border:1px solid var(--green); border-radius:6px; padding:9px 18px; font-size:14px; font-weight:500; text-decoration:none; }
  </style>
</head>
<body>
  <header>
    <span class="brand">MUSE</span><span class="tag">.holiday — Analytics</span>
    <h1>Ordini &amp; Preventivi</h1>
  </header>
  <main>
    <form class="filters" id="filters" onsubmit="event.preventDefault(); load();">
      <label>Dal
        <input type="date" id="from" />
      </label>
      <label>Al
        <input type="date" id="to" />
      </label>
      <label>Regione
        <select id="region">
          <option value="">Tutte</option>
          <option>Dolomites</option>
          <option>South Tyrol</option>
          <option>Garda</option>
          <option>Val Gardena</option>
        </select>
      </label>
      <button type="submit">Aggiorna</button>
      <div class="spacer"></div>
      <a id="csvLink" href="/admin/export.csv">Scarica CSV (dettaglio)</a>
      <a id="csvPivotLink" href="/admin/export-orders.csv">Scarica CSV (per ordine)</a>
    </form>

    <div id="err"></div>

    <div class="cards" id="cards"></div>

    <section>
      <h2>Top prodotti</h2>
      <div id="byProduct"></div>
    </section>

    <section>
      <h2>Top clienti</h2>
      <div id="byCustomer"></div>
    </section>

    <section>
      <h2>Per regione</h2>
      <div id="byRegion"></div>
    </section>

    <section>
      <h2>Ordini recenti</h2>
      <div id="recentOrders"></div>
    </section>

    <section>
      <h2>Preventivi pulizia</h2>
      <div class="quote-tabs" role="tablist">
        <button type="button" id="quoteTabPending" class="active" role="tab">Pendenti</button>
        <button type="button" id="quoteTabDecided" role="tab">Decise</button>
      </div>
      <div id="recentQuotes"></div>
    </section>
  </main>

  <div class="modal-overlay" id="quoteModal" role="dialog" aria-modal="true" aria-labelledby="quoteModalTitle">
    <div class="modal-card">
      <div class="modal-header"><h3 id="quoteModalTitle">Decisione preventivo</h3></div>
      <div class="modal-body" id="quoteModalBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn-cancel" id="quoteModalCancel">Annulla</button>
        <button type="button" class="btn-confirm" id="quoteModalConfirm">Conferma</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="orderModal" role="dialog" aria-modal="true" aria-labelledby="orderModalTitle">
    <div class="modal-card wide">
      <div class="modal-header"><h3 id="orderModalTitle">Dettagli ordine</h3></div>
      <div class="modal-body" id="orderModalBody"></div>
      <div class="modal-footer">
        <a id="orderModalCsv" class="btn-link" href="#" download>Scarica CSV</a>
        <button type="button" class="btn-cancel" id="orderModalClose">Chiudi</button>
      </div>
    </div>
  </div>

  <script>
    const eur = (c) => (Number(c || 0) / 100).toFixed(2);
    const esc = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const fmtDate = (ms) => {
      if (!ms) return '';
      const d = new Date(Number(ms));
      return d.toLocaleString('it-IT', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    };

    function qs() {
      const p = new URLSearchParams();
      const from = document.getElementById('from').value;
      const to   = document.getElementById('to').value;
      const region = document.getElementById('region').value;
      if (from) p.set('from', from);
      if (to)   p.set('to', to);
      if (region) p.set('region', region);
      return p.toString();
    }

    const tableState = new WeakMap();
    function renderTable(container, columns, rows, emptyMsg, options) {
      rows = rows || [];
      const opts = Object.assign({ pageSize: 0 }, options || {});
      let state = tableState.get(container);
      if (!state || state.rowsRef !== rows) {
        state = { query: '', page: 1, rowsRef: rows };
        tableState.set(container, state);
      }
      const useSearch = !!opts.search;
      const searchHtml = useSearch
        ? `<div class="table-search"><input type="search" placeholder="${esc(opts.search.placeholder || 'Cerca…')}" value="${esc(state.query)}" /></div>`
        : '';
      container.innerHTML = `${searchHtml}<div class="table-area"></div><div class="table-pager-area"></div>`;
      const tableArea = container.querySelector('.table-area');
      const pagerArea = container.querySelector('.table-pager-area');

      function redraw() {
        let filtered = rows;
        if (useSearch && state.query) {
          const q = state.query.toLowerCase();
          filtered = rows.filter(r => opts.search.keys.some(k => String(r[k] == null ? '' : r[k]).toLowerCase().includes(q)));
        }
        const pageSize = opts.pageSize > 0 ? opts.pageSize : filtered.length || 1;
        const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
        if (state.page > totalPages) state.page = totalPages;
        const start = (state.page - 1) * pageSize;
        const end   = Math.min(start + pageSize, filtered.length);
        const paged = filtered.slice(start, end);

        const head = columns.map(c => `<th class="${c.num ? 'num' : ''}">${esc(c.label)}</th>`).join('');
        let body;
        if (paged.length) {
          body = paged.map((r, i) => {
            const cls = opts.onRowClick ? 'clickable' : '';
            return `<tr class="${cls}" data-row-idx="${start + i}">` + columns.map(c => {
              const v = c.value ? c.value(r) : r[c.key];
              return `<td class="${c.num ? 'num' : ''}">${c.raw ? v : esc(v)}</td>`;
            }).join('') + '</tr>';
          }).join('');
        } else {
          body = `<tr><td class="empty" colspan="${columns.length}" style="text-align:center;padding:16px;color:var(--muted)">${esc(state.query ? 'Nessun risultato.' : (emptyMsg || 'Nessun dato'))}</td></tr>`;
        }
        tableArea.innerHTML = `<div class="table-scroll"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;

        const usePager = opts.pageSize > 0 && filtered.length > opts.pageSize;
        if (usePager) {
          pagerArea.innerHTML = `<div class="table-pager">
            <button type="button" data-pager="prev" ${state.page <= 1 ? 'disabled' : ''}>‹</button>
            <span>${state.page} / ${totalPages}</span>
            <button type="button" data-pager="next" ${state.page >= totalPages ? 'disabled' : ''}>›</button>
            <span class="pager-meta">${filtered.length} risultat${filtered.length === 1 ? 'o' : 'i'}${state.query ? ' (filtrati)' : ''}</span>
          </div>`;
        } else if (state.query && filtered.length) {
          pagerArea.innerHTML = `<div class="table-pager"><span class="pager-meta">${filtered.length} risultat${filtered.length === 1 ? 'o' : 'i'} (filtrati)</span></div>`;
        } else {
          pagerArea.innerHTML = '';
        }

        if (opts.onRowClick) {
          tableArea.querySelectorAll('tbody tr.clickable').forEach(tr => {
            tr.addEventListener('click', () => {
              const idx = Number(tr.dataset.rowIdx);
              if (Number.isFinite(idx) && filtered[idx]) opts.onRowClick(filtered[idx]);
            });
          });
        }
        pagerArea.querySelectorAll('button[data-pager]').forEach(b => {
          b.addEventListener('click', () => {
            if (b.dataset.pager === 'prev') state.page = Math.max(1, state.page - 1);
            else                            state.page = Math.min(totalPages, state.page + 1);
            redraw();
          });
        });
      }

      if (useSearch) {
        container.querySelector('.table-search input').addEventListener('input', (e) => {
          state.query = e.target.value;
          state.page = 1;
          redraw();
        });
      }
      redraw();
    }

    async function load() {
      document.getElementById('err').innerHTML = '';
      const params = qs();
      document.getElementById('csvLink').href = '/admin/export.csv' + (params ? '?' + params : '');
      document.getElementById('csvPivotLink').href = '/admin/export-orders.csv' + (params ? '?' + params : '');
      let data;
      try {
        const res = await fetch('/admin/api/stats' + (params ? '?' + params : ''));
        data = await res.json();
        if (!data.success) throw new Error(data.error || 'Errore');
      } catch (e) {
        document.getElementById('err').innerHTML = `<div class="err">Errore caricamento: ${esc(e.message)}</div>`;
        return;
      }

      const s = data.summary || {};
      const q = data.quotesSummary || {};
      document.getElementById('cards').innerHTML = `
        <div class="card"><div class="label">Ordini</div><div class="value">${s.total_orders || 0}</div></div>
        <div class="card"><div class="label">Fatturato</div><div class="value">€${eur(s.total_revenue_cents)}</div><div class="sub">Shop linea</div></div>
        <div class="card"><div class="label">Articoli venduti</div><div class="value">${s.total_items || 0}</div></div>
        <div class="card"><div class="label">Valore medio ordine</div><div class="value">€${eur(s.avg_order_cents)}</div></div>
        <div class="card"><div class="label">Preventivi accettati</div><div class="value">${q.accepted_quotes || 0}</div><div class="sub">€${eur(q.accepted_revenue_cents)} pulizie</div></div>
        <div class="card"><div class="label">Preventivi in sospeso</div><div class="value">${q.pending_quotes || 0}</div><div class="sub">${q.denied_quotes || 0} rifiutati</div></div>
      `;

      renderTable(document.getElementById('byProduct'), [
        { label:'Prodotto', key:'product_title' },
        { label:'ID',       key:'product_id' },
        { label:'Qtà',      key:'total_qty', num:true },
        { label:'Ordini',   key:'order_count', num:true },
        { label:'Fatturato', num:true, value:(r)=>'€'+eur(r.total_revenue_cents) }
      ], data.byProduct, null, {
        search: { keys: ['product_title', 'product_id'], placeholder: 'Cerca prodotto…' }
      });

      renderTable(document.getElementById('byCustomer'), [
        { label:'Cliente', key:'customer_name' },
        { label:'Email',   key:'customer_email' },
        { label:'Ordini',  key:'order_count', num:true },
        { label:'Pezzi',   key:'total_qty', num:true },
        { label:'Totale',  num:true, value:(r)=>'€'+eur(r.total_revenue_cents) }
      ], data.byCustomer, null, {
        search: { keys: ['customer_name', 'customer_email'], placeholder: 'Cerca cliente…' }
      });

      renderTable(document.getElementById('byRegion'), [
        { label:'Regione', key:'region' },
        { label:'Ordini',  key:'order_count', num:true },
        { label:'Fatturato', num:true, value:(r)=>'€'+eur(r.total_revenue_cents) }
      ], data.byRegion);

      renderTable(document.getElementById('recentOrders'), [
        { label:'Data',    value:(r)=>fmtDate(r.created_at) },
        { label:'Cliente', key:'customer_name' },
        { label:'Email',   key:'customer_email' },
        { label:'Regione', key:'region' },
        { label:'Pezzi',   key:'item_count', num:true },
        { label:'Totale',  num:true, value:(r)=>'€'+eur(r.total_cents) }
      ], data.recentOrders, null, {
        search: { keys: ['customer_name', 'customer_email', 'region'], placeholder: 'Cerca per nome, email o regione…' },
        pageSize: 25,
        onRowClick: (r) => openOrderModal(r.id)
      });

      lastQuotes = data.recentQuotes || [];
      renderQuotes();
    }

    let lastQuotes = [];
    let quotesView = 'pending';
    const truncate = (s, n) => { s = String(s || ''); return s.length > n ? s.slice(0, n - 1) + '…' : s; };

    function renderQuotes() {
      const container = document.getElementById('recentQuotes');
      const pending = lastQuotes.filter(r => r.status === 'pending');
      const decided = lastQuotes.filter(r => r.status !== 'pending');
      const quoteSearch = { keys: ['requester_name', 'requester_email', 'apartment_id', 'region'], placeholder: 'Cerca per nome, email, appartamento o regione…' };
      if (quotesView === 'pending') {
        renderTable(container, [
          { label:'Data',    value:(r)=>fmtDate(r.created_at) },
          { label:'Cliente', key:'requester_name' },
          { label:'App.',    key:'apartment_id' },
          { label:'Data pulizia', key:'requested_date' },
          { label:'Regione', key:'region' },
          { label:'Stato',   raw:true, value:(r)=>`<span class="status ${esc(r.status)}">${esc(r.status)}</span>` },
          { label:'Azioni',  raw:true, value:(r)=>
            `<button class="btn-accept" data-decide="accept" data-qid="${esc(r.id)}">Accetta</button>
             <button class="btn-deny" data-decide="deny" data-qid="${esc(r.id)}">Rifiuta</button>` }
        ], pending, 'Nessun preventivo in sospeso.', { search: quoteSearch, pageSize: 25 });
      } else {
        renderTable(container, [
          { label:'Data',    value:(r)=>fmtDate(r.created_at) },
          { label:'Cliente', key:'requester_name' },
          { label:'App.',    key:'apartment_id' },
          { label:'Data pulizia', key:'requested_date' },
          { label:'Regione', key:'region' },
          { label:'Stato',   raw:true, value:(r)=>`<span class="status ${esc(r.status)}">${esc(r.status)}</span>` },
          { label:'Prezzo',  num:true, value:(r)=> r.quoted_price_cents != null ? '€'+eur(r.quoted_price_cents) : '—' },
          { label:'Decisa',  value:(r)=>fmtDate(r.decided_at) },
          { label:'Note',    raw:true, value:(r)=> r.decision_notes
            ? `<span title="${esc(r.decision_notes)}">${esc(truncate(r.decision_notes, 80))}</span>`
            : '<span style="color:var(--muted)">—</span>' }
        ], decided, 'Nessun preventivo deciso ancora.', { search: quoteSearch, pageSize: 25 });
      }
    }

    document.getElementById('quoteTabPending').addEventListener('click', () => {
      quotesView = 'pending';
      document.getElementById('quoteTabPending').classList.add('active');
      document.getElementById('quoteTabDecided').classList.remove('active');
      renderQuotes();
    });
    document.getElementById('quoteTabDecided').addEventListener('click', () => {
      quotesView = 'decided';
      document.getElementById('quoteTabDecided').classList.add('active');
      document.getElementById('quoteTabPending').classList.remove('active');
      renderQuotes();
    });

    function openQuoteModal(quote, decision) {
      return new Promise((resolve, reject) => {
        const overlay = document.getElementById('quoteModal');
        const body    = document.getElementById('quoteModalBody');
        const title   = document.getElementById('quoteModalTitle');
        const confirm = document.getElementById('quoteModalConfirm');
        const cancel  = document.getElementById('quoteModalCancel');

        title.textContent = decision === 'accept' ? 'Accetta preventivo' : 'Rifiuta preventivo';
        confirm.textContent = decision === 'accept' ? 'Accetta & invia' : 'Rifiuta & invia';
        confirm.classList.toggle('deny', decision === 'deny');

        const priceField = decision === 'accept' ? `
          <label for="qm-price">Prezzo pulizia (€, IVA esclusa)</label>
          <input id="qm-price" type="number" min="0" step="0.01" placeholder="Es. 80.00" />
        ` : '';
        const intent = decision === 'accept'
          ? 'Il cliente riceverà una email di conferma con il prezzo indicato.'
          : 'Il cliente riceverà una email di rifiuto. L\'azione non è reversibile dalla dashboard.';

        body.innerHTML = `
          <div class="meta">
            <div><strong>Cliente:</strong> ${esc(quote.requester_name)} &lt;${esc(quote.requester_email)}&gt;</div>
            <div><strong>Appartamento:</strong> ${esc(quote.apartment_id)}</div>
            <div><strong>Data pulizia:</strong> ${esc(quote.requested_date)}</div>
            <div><strong>Regione:</strong> ${esc(quote.region)}</div>
          </div>
          ${priceField}
          <label for="qm-notes">Note interne (facoltative, non inviate al cliente)</label>
          <textarea id="qm-notes" maxlength="1000" placeholder="Es. apartamento al 3° piano, chiavi in cassetta…"></textarea>
          <div style="font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5">${intent}</div>
        `;

        let done = false;
        const close = () => {
          if (done) return;
          done = true;
          overlay.classList.remove('open');
          confirm.disabled = false;
          confirm.removeEventListener('click', onConfirm);
          cancel.removeEventListener('click', onCancel);
          overlay.removeEventListener('click', onBackdrop);
          document.removeEventListener('keydown', onKey);
        };
        const onConfirm = () => {
          let priceCents = null;
          if (decision === 'accept') {
            const n = Number(document.getElementById('qm-price').value);
            if (!Number.isFinite(n) || n < 0) { alert('Prezzo non valido'); return; }
            priceCents = Math.round(n * 100);
          }
          const notes = document.getElementById('qm-notes').value.trim();
          confirm.disabled = true;
          close();
          resolve({ priceCents, notes: notes || null });
        };
        const onCancel = () => { close(); reject(new Error('cancelled')); };
        const onBackdrop = (e) => { if (e.target === overlay) onCancel(); };
        const onKey = (e) => {
          if (e.key === 'Escape') onCancel();
          else if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) onConfirm();
        };

        confirm.addEventListener('click', onConfirm);
        cancel.addEventListener('click', onCancel);
        overlay.addEventListener('click', onBackdrop);
        document.addEventListener('keydown', onKey);
        overlay.classList.add('open');
        setTimeout(() => {
          const first = document.getElementById(decision === 'accept' ? 'qm-price' : 'qm-notes');
          if (first) first.focus();
        }, 0);
      });
    }

    async function decideQuote(quoteId, decision) {
      const quote = lastQuotes.find(q => q.id === quoteId);
      if (!quote) return;
      let payload;
      try { payload = await openQuoteModal(quote, decision); }
      catch { return; }
      try {
        const res = await fetch('/admin/api/quote-decide', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quoteId, decision, ...payload })
        });
        const body = await res.json();
        if (!body.success) throw new Error(body.error || 'Errore');
        await load();
      } catch (err) {
        alert('Errore: ' + err.message);
      }
    }

    document.getElementById('recentQuotes').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-decide]');
      if (!btn) return;
      btn.disabled = true;
      decideQuote(btn.dataset.qid, btn.dataset.decide).finally(() => { btn.disabled = false; });
    });

    async function openOrderModal(orderId) {
      const overlay = document.getElementById('orderModal');
      const body    = document.getElementById('orderModalBody');
      const title   = document.getElementById('orderModalTitle');
      const csvLink = document.getElementById('orderModalCsv');
      const closeBtn= document.getElementById('orderModalClose');

      const close = () => {
        overlay.classList.remove('open');
        closeBtn.removeEventListener('click', close);
        overlay.removeEventListener('click', onBackdrop);
        document.removeEventListener('keydown', onKey);
      };
      const onBackdrop = (e) => { if (e.target === overlay) close(); };
      const onKey = (e) => { if (e.key === 'Escape') close(); };

      title.textContent = 'Dettagli ordine';
      body.innerHTML = '<div class="empty" style="padding:32px;text-align:center;color:var(--muted)">Caricamento…</div>';
      csvLink.href = '/admin/export.csv?orderId=' + encodeURIComponent(orderId);
      overlay.classList.add('open');
      closeBtn.addEventListener('click', close);
      overlay.addEventListener('click', onBackdrop);
      document.addEventListener('keydown', onKey);

      try {
        const res = await fetch('/admin/api/order/' + encodeURIComponent(orderId));
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Errore');
        const o = data.order;
        title.textContent = 'Ordine #' + String(o.id).slice(0, 8);
        const itemsRows = (o.items || []).length
          ? (o.items || []).map(it => `<tr>
              <td>${esc(it.product_title)}<br/><span style="color:var(--muted);font-size:11px">${esc(it.product_id)}</span></td>
              <td class="num">${Number(it.qty || 0)}</td>
              <td class="num">€${eur(it.unit_price_cents)}</td>
              <td class="num">€${eur(it.line_total_cents)}</td>
            </tr>`).join('')
          : `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:14px">Nessun articolo nell'ordine.</td></tr>`;
        body.innerHTML = `
          <div class="meta">
            <div><strong>Data:</strong> ${esc(fmtDate(o.created_at))}</div>
            <div><strong>Cliente:</strong> ${esc(o.customer_name)} &lt;${esc(o.customer_email)}&gt;</div>
            <div><strong>Regione:</strong> ${esc(o.region)}${o.source ? ` <span style="color:var(--muted);font-size:12px">(${esc(o.source)})</span>` : ''}</div>
            <div><strong>Totale:</strong> €${eur(o.total_cents)} &mdash; ${Number(o.item_count || 0)} pezzi</div>
          </div>
          <table class="order-items">
            <thead><tr><th>Prodotto</th><th class="num">Qtà</th><th class="num">Prezzo unit.</th><th class="num">Totale linea</th></tr></thead>
            <tbody>${itemsRows}</tbody>
          </table>`;
      } catch (err) {
        body.innerHTML = `<div class="err">Errore caricamento ordine: ${esc(err.message)}</div>`;
      }
    }

    load();
  </script>
</body>
</html>
