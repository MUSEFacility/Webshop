<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MUSE Analytics</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    :root { --green:#2d5016; --bg:#f8f5f0; --card:#ffffff; --muted:#a09888; --border:#e8e3dc; --text:#2a2620; --accent:#1f6640; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); }
    header { background:var(--green); color:#fff; padding:20px 28px; display:flex; align-items:center; gap:12px; }
    header .brand { font-weight:600; letter-spacing:.04em; font-size:20px; }
    header .tag { color:rgba(255,255,255,.7); font-size:13px; }
    header h1 { margin-left:auto; font-size:16px; font-weight:500; opacity:.9; }
    main { max-width:1200px; margin:0 auto; padding:24px; }
    .filters { background:var(--card); border-radius:12px; padding:16px 20px; margin-bottom:20px; display:flex; gap:16px; align-items:flex-end; flex-wrap:wrap; box-shadow:0 2px 12px rgba(0,0,0,.04); }
    .filters label { display:flex; flex-direction:column; font-size:12px; color:var(--muted); gap:4px; }
    .filters input, .filters select { padding:8px 10px; border:1px solid var(--border); border-radius:6px; font-size:14px; min-width:140px; }
    .filters button { padding:10px 18px; background:var(--green); color:#fff; border:0; border-radius:6px; cursor:pointer; font-size:14px; font-weight:500; }
    .filters .spacer { flex:1; }
    .filters a { text-decoration:none; padding:10px 18px; background:#fff; color:var(--green); border:1px solid var(--green); border-radius:6px; font-size:14px; font-weight:500; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
    .card { background:var(--card); border-radius:12px; padding:18px 20px; box-shadow:0 2px 12px rgba(0,0,0,.04); }
    .card .label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .card .value { font-size:26px; font-weight:600; color:var(--green); margin-top:6px; }
    .card .sub { font-size:12px; color:var(--muted); margin-top:4px; }
    section { background:var(--card); border-radius:12px; padding:20px 24px; margin-bottom:20px; box-shadow:0 2px 12px rgba(0,0,0,.04); }
    section h2 { margin:0 0 14px; font-size:16px; color:var(--green); }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--border); }
    th { font-size:12px; color:var(--muted); font-weight:500; text-transform:uppercase; letter-spacing:.05em; }
    td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
    .empty { color:var(--muted); padding:16px; text-align:center; font-size:14px; }
    .status { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:500; }
    .status.pending  { background:#fef6e0; color:#8a6600; }
    .status.accepted { background:#e3f3e9; color:#1f6640; }
    .status.denied   { background:#fde8e8; color:#9b2626; }
    .err { background:#fef5f5; border-left:4px solid #b00020; padding:12px 16px; border-radius:0 8px 8px 0; color:#9b2626; font-size:14px; margin-bottom:16px; }
  </style>
</head>
<body>
  <header>
    <span class="brand">MUSE</span><span class="tag">.holiday — Analytics</span>
    <h1>Ordini &amp; Preventivi</h1>
  </header>
  <main>
    <form class="filters" id="filters" onsubmit="event.preventDefault(); load();">
      <label>Dal
        <input type="date" id="from" />
      </label>
      <label>Al
        <input type="date" id="to" />
      </label>
      <label>Regione
        <select id="region">
          <option value="">Tutte</option>
          <option>Dolomites</option>
          <option>South Tyrol</option>
          <option>Garda</option>
          <option>Val Gardena</option>
        </select>
      </label>
      <button type="submit">Aggiorna</button>
      <div class="spacer"></div>
      <a id="csvLink" href="/admin/export.csv">Scarica CSV (dettaglio)</a>
      <a id="csvPivotLink" href="/admin/export-orders.csv">Scarica CSV (per ordine)</a>
    </form>

    <div id="err"></div>

    <div class="cards" id="cards"></div>

    <section>
      <h2>Top prodotti</h2>
      <div id="byProduct"></div>
    </section>

    <section>
      <h2>Top clienti</h2>
      <div id="byCustomer"></div>
    </section>

    <section>
      <h2>Per regione</h2>
      <div id="byRegion"></div>
    </section>

    <section>
      <h2>Ordini recenti</h2>
      <div id="recentOrders"></div>
    </section>

    <section>
      <h2>Preventivi pulizia</h2>
      <div id="recentQuotes"></div>
    </section>
  </main>

  <script>
    const eur = (c) => (Number(c || 0) / 100).toFixed(2);
    const esc = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const fmtDate = (ms) => {
      if (!ms) return '';
      const d = new Date(Number(ms));
      return d.toLocaleString('it-IT', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    };

    function qs() {
      const p = new URLSearchParams();
      const from = document.getElementById('from').value;
      const to   = document.getElementById('to').value;
      const region = document.getElementById('region').value;
      if (from) p.set('from', from);
      if (to)   p.set('to', to);
      if (region) p.set('region', region);
      return p.toString();
    }

    function renderTable(container, columns, rows, emptyMsg) {
      if (!rows || !rows.length) {
        container.innerHTML = `<div class="empty">${emptyMsg || 'Nessun dato'}</div>`;
        return;
      }
      const head = columns.map(c => `<th class="${c.num ? 'num' : ''}">${esc(c.label)}</th>`).join('');
      const body = rows.map(r => '<tr>' + columns.map(c => {
        const v = c.value ? c.value(r) : r[c.key];
        return `<td class="${c.num ? 'num' : ''}">${c.raw ? v : esc(v)}</td>`;
      }).join('') + '</tr>').join('');
      container.innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    async function load() {
      document.getElementById('err').innerHTML = '';
      const params = qs();
      document.getElementById('csvLink').href = '/admin/export.csv' + (params ? '?' + params : '');
      document.getElementById('csvPivotLink').href = '/admin/export-orders.csv' + (params ? '?' + params : '');
      let data;
      try {
        const res = await fetch('/admin/api/stats' + (params ? '?' + params : ''));
        data = await res.json();
        if (!data.success) throw new Error(data.error || 'Errore');
      } catch (e) {
        document.getElementById('err').innerHTML = `<div class="err">Errore caricamento: ${esc(e.message)}</div>`;
        return;
      }

      const s = data.summary || {};
      const q = data.quotesSummary || {};
      document.getElementById('cards').innerHTML = `
        <div class="card"><div class="label">Ordini</div><div class="value">${s.total_orders || 0}</div></div>
        <div class="card"><div class="label">Fatturato</div><div class="value">€${eur(s.total_revenue_cents)}</div><div class="sub">Shop linea</div></div>
        <div class="card"><div class="label">Articoli venduti</div><div class="value">${s.total_items || 0}</div></div>
        <div class="card"><div class="label">Valore medio ordine</div><div class="value">€${eur(s.avg_order_cents)}</div></div>
        <div class="card"><div class="label">Preventivi accettati</div><div class="value">${q.accepted_quotes || 0}</div><div class="sub">€${eur(q.accepted_revenue_cents)} pulizie</div></div>
        <div class="card"><div class="label">Preventivi in sospeso</div><div class="value">${q.pending_quotes || 0}</div><div class="sub">${q.denied_quotes || 0} rifiutati</div></div>
      `;

      renderTable(document.getElementById('byProduct'), [
        { label:'Prodotto', key:'product_title' },
        { label:'ID',       key:'product_id' },
        { label:'Qtà',      key:'total_qty', num:true },
        { label:'Ordini',   key:'order_count', num:true },
        { label:'Fatturato', num:true, value:(r)=>'€'+eur(r.total_revenue_cents) }
      ], data.byProduct);

      renderTable(document.getElementById('byCustomer'), [
        { label:'Cliente', key:'customer_name' },
        { label:'Email',   key:'customer_email' },
        { label:'Ordini',  key:'order_count', num:true },
        { label:'Pezzi',   key:'total_qty', num:true },
        { label:'Totale',  num:true, value:(r)=>'€'+eur(r.total_revenue_cents) }
      ], data.byCustomer);

      renderTable(document.getElementById('byRegion'), [
        { label:'Regione', key:'region' },
        { label:'Ordini',  key:'order_count', num:true },
        { label:'Fatturato', num:true, value:(r)=>'€'+eur(r.total_revenue_cents) }
      ], data.byRegion);

      renderTable(document.getElementById('recentOrders'), [
        { label:'Data',    value:(r)=>fmtDate(r.created_at) },
        { label:'Cliente', key:'customer_name' },
        { label:'Email',   key:'customer_email' },
        { label:'Regione', key:'region' },
        { label:'Pezzi',   key:'item_count', num:true },
        { label:'Totale',  num:true, value:(r)=>'€'+eur(r.total_cents) }
      ], data.recentOrders);

      renderTable(document.getElementById('recentQuotes'), [
        { label:'Data',    value:(r)=>fmtDate(r.created_at) },
        { label:'Cliente', key:'requester_name' },
        { label:'App.',    key:'apartment_id' },
        { label:'Data pulizia', key:'requested_date' },
        { label:'Regione', key:'region' },
        { label:'Stato',   raw:true, value:(r)=>`<span class="status ${esc(r.status)}">${esc(r.status)}</span>` },
        { label:'Prezzo',  num:true, value:(r)=> r.quoted_price_cents != null ? '€'+eur(r.quoted_price_cents) : '—' }
      ], data.recentQuotes);
    }

    load();
  </script>
</body>
</html>
